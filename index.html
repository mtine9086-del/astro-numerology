<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Numerology</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
background:#6a0dad;
color:white;
border:none;
padding:12px 25px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>

</head>
<body>

<div class="container">

<h1>Astro Numerology</h1>

<p>Get Your Personalized Numerology Consultation</p>

<form>

<input type="text" placeholder="Full Name" required>

<input type="tel" placeholder="Mobile Number" required>

<input type="email" placeholder="Email Address" required>

<input type="date">

<textarea placeholder="Your Message"></textarea>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html>
