<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Astro Numerology</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
text-align:center;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
background:#6a0dad;
color:white;
border:none;
padding:12px 25px;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

#successMessage{
display:none;
color:green;
font-weight:bold;
margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Astro Numerology</h1>

<p>Get Your Personalized Numerology Consultation</p>

<form id="leadForm">

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="mobile" placeholder="Mobile Number" required>

<input type="email" id="email" placeholder="Email Address" required>

<input type="date" id="dob">

<input type="text" id="birthtime" placeholder="Birth Time">

<input type="text" id="birthplace" placeholder="Birth Place">

<textarea id="message" placeholder="Your Message"></textarea>

<button type="submit">Submit</button>

</form>

<p id="successMessage">
Thank you! Your details have been submitted successfully.
</p>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbxsrB4zqOju5ggm73w2VN2_VIxDTNoUDaDZawpqgSI6i5K8NvfG1VGREBkpBXPgJqB2WQ/exec";

document.getElementById("leadForm").addEventListener("submit", function(e){

e.preventDefault();

const data = {
name: document.getElementById("name").value,
mobile: document.getElementById("mobile").value,
email: document.getElementById("email").value,
dob: document.getElementById("dob").value,
birthtime: document.getElementById("birthtime").value,
birthplace: document.getElementById("birthplace").value,
message: document.getElementById("message").value
};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(response => {
document.getElementById("successMessage").style.display="block";
document.getElementById("leadForm").reset();
})
.catch(error => {
console.error(error);
alert("Error! Please try again.");
});

});

</script>

</body>
</html>
